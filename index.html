<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Isekai Tower</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui-container">
        <div id="main-menu">
            <h1>Isekai Tower</h1>
            <h2>Creación de Personaje</h2>
            <form id="character-form">
                <div class="form-group">
                    <label for="char-name">Nombre:</label>
                    <input type="text" id="char-name" required placeholder="Ingresa tu nombre..." maxlength="20">
                </div>
                
                <div class="form-group">
                    <label>Clase:</label>
                    <div class="options">
                        <label class="option-card">
                            <input type="radio" name="char-class" value="warrior" checked>
                            <span class="card-content">
                                <strong>Guerrero</strong>
                            </span>
                        </label>
                        <label class="option-card">
                            <input type="radio" name="char-class" value="mage">
                            <span class="card-content">
                                <strong>Mago</strong>
                            </span>
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <label>Género:</label>
                    <div class="options">
                        <label class="option-card">
                            <input type="radio" name="char-gender" value="male" checked>
                            <span class="card-content">
                                <strong>Hombre</strong>
                            </span>
                        </label>
                        <label class="option-card">
                            <input type="radio" name="char-gender" value="female">
                            <span class="card-content">
                                <strong>Mujer</strong>
                            </span>
                        </label>
                    </div>
                </div>
                <button type="button" id="continue-btn" class="hidden" style="background-color: #27ae60; margin-bottom: 10px;">Continuar Partida</button>
                <button type="submit" id="start-btn">Nueva Aventura</button>
            </form>
        </div>

        

        <div id="game-ui" class="hidden">
            <div id="hud">
                <div class="hud-stat">❤️ <span id="hud-hp">100/100</span></div>
                <div class="hud-stat" style="color: #3498db;">🔵 <span id="hud-mana">100/100</span></div>
                <div class="hud-info"><span id="hud-name">Player</span> (<span id="hud-class">Warrior</span>)</div>
                <div class="hud-stat">Piso: <span id="hud-floor">1</span></div>
                <button type="button" id="backpack-btn" style="padding: 5px; margin-left: 10px; background: #8e44ad;">🎒 Mochila</button>
            </div>
            
            <!-- Power Bar -->
            <div id="power-bar">
                <div class="power-slot" id="slot-0"><span class="slot-key">1</span></div>
                <div class="power-slot" id="slot-1"><span class="slot-key">2</span></div>
                <div class="power-slot" id="slot-2"><span class="slot-key">3</span></div>
            </div>
        </div>
        
        <div id="inventory-modal" class="hidden">
            <div class="inventory-content">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h2>🎒 Mochila</h2>
                    <button type="button" id="close-inventory" style="background: #e74c3c; padding: 5px 10px;">X</button>
                </div>
                
                <div style="display: flex; gap: 20px; margin-top: 15px;">
                    <!-- Backpack Slots -->
                    <div style="flex: 2;">
                        <h3>Objetos (15 Slots)</h3>
                        <div id="backpack-grid" class="grid-container">
                            <!-- 15 slots generated by JS -->
                        </div>
                    </div>
                    
                    <!-- Equipment Slots -->
                    <div style="flex: 1;">
                        <h3>Equipamiento</h3>
                        <div id="equipment-grid" class="grid-container equip-grid">
                            <!-- 4 slots generated by JS -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="reward-screen" class="hidden">
            <h2>¡Piso Completado!</h2>
            <p id="reward-desc">Elige un nuevo poder elemental:</p>
            <div id="reward-options" class="flex-row">
                <!-- Opciones generadas por JS -->
            </div>
            <div id="slot-selection" class="hidden">
                <p>Tu barra está llena. Elige qué poder quieres reemplazar:</p>
                <div class="flex-row" style="gap: 10px;">
                    <button type="button" onclick="replacePower(0)">Reemplazar Slot 1</button>
                    <button type="button" onclick="replacePower(1)">Reemplazar Slot 2</button>
                    <button type="button" onclick="replacePower(2)">Reemplazar Slot 3</button>
                </div>
            </div>
        </div>
        
        <div id="game-over" class="hidden">
            <h2>Has Muerto</h2>
            <p>La aventura continúa en otra vida...</p> <!-- Un texto más temático -->
            <button id="restart-btn">Reencarnar en Piso 1</button> <!-- Texto actualizado -->
        </div>

        <!-- Controles Móviles Virtuales -->
        <div id="mobile-controls" class="hidden">
            <!-- Virtual Joystick Container (Left Side Zone) -->
            <div id="joystick-zone">
                <div id="joystick-base">
                    <div id="joystick-knob"></div>
                </div>
            </div>
            
            <div id="touch-actions">
                <div class="power-buttons">
                    <button type="button" id="btn-p1" class="power-btn">1</button>
                    <button type="button" id="btn-p2" class="power-btn">2</button>
                    <button type="button" id="btn-p3" class="power-btn">3</button>
                </div>
                <button type="button" id="btn-attack">⚔️</button>
            </div>
        </div>
    </div>

    <!-- El canvas está separado del UI container para ocupar toda la pantalla por detrás -->
    <canvas id="game-canvas" class="hidden"></canvas>

    <script src="js/dungeon.js"></script>
    <script src="js/player.js"></script>
    <script src="js/enemy.js"></script>
    <script src="js/boss.js"></script>
    <script src="js/Floor10Boss.js"></script>
    <script src="js/Floor15Boss.js"></script>
    <script src="js/game.js" defer></script>
</body>
</html>
